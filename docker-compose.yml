# GeoPublish - DEV local
#
# Este compose executa apenas o ambiente de desenvolvimento. A producao roda em
# Google Cloud com Cloud Run, Cloud SQL, GCS, Redis gerenciado/externo e
# GeoServer dedicado.
#
# Storage local:
# - Recomendado: GCS real via Application Default Credentials.
# - Antes de subir: gcloud auth application-default login
# - Em Windows, o compose monta ${APPDATA}/gcloud nos containers.

x-common-env: &common-env
  ENVIRONMENT: dev
  GCP_PROJECT_ID: geopublish
  GOOGLE_CLOUD_PROJECT: geopublish
  DATABASE_URL: postgresql+asyncpg://geo:geo@postgres:5432/geodb
  DATABASE_SYNC_URL: postgresql://geo:geo@postgres:5432/geodb
  REDIS_URL: redis://redis:6379/0
  REDIS_STREAM_UPLOADED: image:uploaded
  REDIS_STREAM_PROCESSED: image:processed
  REDIS_CONSUMER_GROUP: workers
  GEOSERVER_URL: http://geoserver:8080/geoserver
  GEOSERVER_PUBLIC_URL: http://localhost:8080/geoserver
  GEOSERVER_ADMIN_USER: admin
  GEOSERVER_ADMIN_PASSWORD: geoserver
  GEOSERVER_WORKSPACE: geoimages
  VECTOR_DEFAULT_DATASTORE: postgis_ds
  POSTGIS_SCHEMA: public
  RASTER_TARGET_CRS: EPSG:3857
  TARGET_CRS: EPSG:3857
  WORKER_JOB_TRIGGER_ENABLED: "false"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geodb"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - geopublish

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - geopublish

  geoserver:
    image: docker.osgeo.org/geoserver:2.25.x
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      INITIAL_MEMORY: 512M
      MAXIMUM_MEMORY: 2G
      GEOWEBCACHE_CACHE_DIR: /opt/geoserver/data_dir/gwc
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/geoserver/web/"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - geopublish

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./env/.env.dev
    environment:
      <<: *common-env
      PORT: "8000"
      GOOGLE_APPLICATION_CREDENTIALS: /home/appuser/.config/gcloud/legacy_credentials/upload@funrio.iam.gserviceaccount.com/adc.json
      API_SECRET_KEY: changeme-dev
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ${APPDATA}/gcloud:/home/appuser/.config/gcloud:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - geopublish

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - ./env/.env.dev
    environment:
      <<: *common-env
      PORT: "8081"
      GOOGLE_APPLICATION_CREDENTIALS: /home/worker/.config/gcloud/legacy_credentials/upload@funrio.iam.gserviceaccount.com/adc.json
      WORKER_MODE: service
      WORKER_ENABLE_HEALTH_SERVER: "true"
      WORKER_ENABLE_STARTUP_SYNC: "true"
      GDAL_CACHEMAX: "512"
      GDAL_NUM_THREADS: ALL_CPUS
    ports:
      - "8081:8081"
    volumes:
      - ./worker:/worker
      - ${APPDATA}/gcloud:/home/worker/.config/gcloud:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      geoserver:
        condition: service_healthy
    networks:
      - geopublish
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      DEV_API_URL: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - api
    networks:
      - geopublish

volumes:
  postgres_data:
  redis_data:
  geoserver_data:
  frontend_node_modules:
  frontend_next:

networks:
  geopublish:
    driver: bridge
